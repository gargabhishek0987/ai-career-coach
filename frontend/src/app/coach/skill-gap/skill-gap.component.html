<div class="page-container">
  <h2 class="page-title">📊 Skill Gap Analyzer</h2>
  <p class="page-subtitle">Paste a job description and AI will compare it against your uploaded resume</p>

  <div class="card">
    <div class="alert-error" *ngIf="error">{{ error }}</div>
    <div class="form-group">
      <label>Job Description</label>
      <textarea [(ngModel)]="jobDescription" placeholder="Paste the full job description here..." rows="8"></textarea>
    </div>
    <button class="btn-primary" (click)="analyze()" [disabled]="loading">
      <span class="spinner" *ngIf="loading"></span>
      {{ loading ? 'Analyzing skill gap...' : 'Analyze Skill Gap' }}
    </button>
  </div>

  <div class="ai-response" *ngIf="response">{{ response }}</div>
</div>
